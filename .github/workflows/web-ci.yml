name: Web App CI

on:
  push:
    branches:
      - main
    paths:
      - 'web-app/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'web-app/**'
      - '.github/workflows/web-ci.yml'
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: web-app
        # Delete the lockfile first so npm resolves platform-specific optional
        # deps (rollup, rolldown) for the Linux runner rather than using the
        # macOS-generated lockfile which only contains darwin bindings.
        run: rm -f package-lock.json && npm install

      - name: Run Vitest unit tests
        working-directory: web-app
        run: npm test

      - name: Build production bundle
        working-directory: web-app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-app/dist/
          retention-days: 7

