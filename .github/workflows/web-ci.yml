name: Web App CI

on:
  push:
    branches:
      - main
    paths:
      - 'web-app/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'web-app/**'
      - '.github/workflows/web-ci.yml'
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        working-directory: web-app
        run: npm ci

      - name: Run Vitest unit tests
        working-directory: web-app
        run: npm test

      - name: Build production bundle
        working-directory: web-app
        run: npm run build

      # TODO: add a 'deploy' job here once AWS S3 + CloudFront is set up by the backend team.
      # See the "Deployment" section in README.md for the required secrets and steps.
