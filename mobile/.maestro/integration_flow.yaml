appId: ${APP_ID}
name: CycleLink current auth profile security flow
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Sign In"
    timeout: 10000

- tapOn: "you@example.com"
- inputText: "alex.johnson@example.com"

- tapOn: "Enter your password"
- inputText: "CycleLink123"
- hideKeyboard

- tapOn:
    text: "Sign In"
    below: "Remember me"

- extendedWaitUntil:
    visible: "Open Profile Settings"
    timeout: 10000

- assertVisible: "Home — discover or customise routes (placeholder)"

- tapOn: "Open Profile Settings"

- extendedWaitUntil:
    visible: "Alex Johnson"
    timeout: 10000

- assertVisible: "Weekly goal: 80 km"

- tapOn: "Edit profile"

- extendedWaitUntil:
    visible: "Save changes"
    timeout: 8000

- tapOn: "Performance"
- tapOn: "Save changes"

- extendedWaitUntil:
    visible: "Performance"
    timeout: 8000

- assertVisible: "Performance"

- tapOn: "Privacy"

- extendedWaitUntil:
    visible: "Privacy controls"
    timeout: 8000

- assertVisible: "Device permissions"

- tapOn:
    id: "privacy-security-cancel-button"

- extendedWaitUntil:
    visible: "Alex Johnson"
    timeout: 8000

- tapOn: "Password"

- extendedWaitUntil:
    visible: "Update password"
    timeout: 8000

- tapOn: "Enter current password"
- inputText: "CycleLink123"

- tapOn: "Enter new password"
- inputText: "CycleLink456"

- tapOn: "Re-enter new password"
- inputText: "CycleLink456"
- hideKeyboard

- tapOn:
    id: "change-password-submit-button"

- extendedWaitUntil:
    visible: "Password changed"
    timeout: 8000

- tapOn: "OK"

- extendedWaitUntil:
    visible: "Alex Johnson"
    timeout: 8000

- tapOn: "Notifications"

- extendedWaitUntil:
    visible: "Privacy controls"
    timeout: 8000

- tapOn:
    id: "notifications-settings-button"
